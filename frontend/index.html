<<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioIA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 32px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: #16a34a;
      color: white;
      padding: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
    }

    .chat-box {
      height: 470px;
      overflow-y: auto;
      padding: 20px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 78%;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #16a34a;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: #e5e7eb;
      color: #222;
    }

    .options-wrap {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: -4px;
      margin-bottom: 4px;
      max-width: 78%;
    }

    .option-btn {
      border: 1px solid #111827;
      background: white;
      color: #111827;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
    }

    .option-btn:hover {
      background: #f3f4f6;
    }

    .option-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .composer {
      display: flex;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid #eee;
      background: white;
    }

    .composer input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .composer button {
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      cursor: pointer;
      font-size: 16px;
    }

    .composer button:hover {
      opacity: 0.95;
    }

    .hint {
      padding: 0 16px 16px;
      color: #555;
      font-size: 14px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>CardioIA 🫀</h1>
      <p>Assistente conversacional de orientação inicial em saúde cardiovascular.</p>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="composer">
      <input
        type="text"
        id="messageInput"
        placeholder="Digite sua mensagem..."
        autocomplete="off"
      />
      <button id="sendBtn">Enviar</button>
    </div>

    <div class="hint">
      Você pode começar digitando ou clicando nas opções do assistente.
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    function scrollChatToBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addMessage(text, sender, isError = false) {
      const div = document.createElement("div");
      div.className = `msg ${sender}`;
      if (isError) div.classList.add("error");
      div.textContent = text;
      chatBox.appendChild(div);
      scrollChatToBottom();
    }

    function disableExistingOptionButtons() {
      const buttons = document.querySelectorAll(".option-btn");
      buttons.forEach(btn => {
        btn.disabled = true;
      });
    }

    function addOptionButtons(options) {
      if (!options || !options.length) return;

      const wrap = document.createElement("div");
      wrap.className = "options-wrap";

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;

        btn.addEventListener("click", () => {
          disableExistingOptionButtons();
          sendMessage(option);
        });

        wrap.appendChild(btn);
      });

      chatBox.appendChild(wrap);
      scrollChatToBottom();
    }

    async function sendMessage(forcedText = null) {
      const text = (forcedText ?? messageInput.value).trim();
      if (!text) return;

      addMessage(text, "user");

      if (!forcedText) {
        messageInput.value = "";
      }

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();

        if (!response.ok) {
          addMessage(`Erro: ${data.error || "Falha na comunicação."}`, "bot", true);
          return;
        }

        addMessage(data.reply || "Sem resposta do assistente.", "bot");
        addOptionButtons(data.options || []);
      } catch (error) {
        addMessage("Erro ao conectar com o backend.", "bot", true);
      }
    }

    sendBtn.addEventListener("click", () => sendMessage());

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
